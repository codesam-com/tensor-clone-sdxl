name: Generate Test

on:
  workflow_dispatch:

jobs:
  generate-test-image:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Clone ComfyUI
        run: |
          git clone https://github.com/comfyanonymous/ComfyUI.git

      - name: Install PyTorch CPU
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install ComfyUI requirements
        run: |
          pip install -r ComfyUI/requirements.txt

      - name: Install repo requirements
        run: |
          pip install -r requirements.txt

      - name: Verify repo assets
        run: |
          ls -lh assets/loras
          ls -lh assets/upscale

      - name: Download base model from Google Drive
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        run: |
          python scripts/download_models.py

      - name: Copy model assets into ComfyUI
        run: |
          python scripts/prepare_models.py

      - name: Build runtime workflow
        run: |
          python scripts/build_workflow.py

      - name: Run generation
        run: |
          python scripts/run_generation.py

      - name: Upload generated images
        uses: actions/upload-artifact@v4
        with:
          name: generated-images
          path: ComfyUI/output/*.png
